info:
  name: Update a user
  type: http
  seq: 4

http:
  method: PUT
  url: "{{baseUrl}}/users/1"
  body:
    type: json
    data: |-
      {
        "username": "Jean"
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:3000

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
